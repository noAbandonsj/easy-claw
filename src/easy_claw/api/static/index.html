<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>easy-claw</title>
<style>
:root {
    --bg-deep: #0a0a1a;
    --bg-surface: #0d0d25;
    --bg-card: #12122a;
    --border: #1a1a3a;
    --border-glow: #ff69b430;
    --text: #e6edf3;
    --dim: #8b949e;
    --pink: #ff69b4;
    --pink-deep: #ff1493;
    --cyan: #00ffff;
    --cyan-dim: #66ffff;
    --green: #3fb950;
    --red: #f85149;
    --sidebar-width: 220px;
    --glow-pink: 0 0 12px #ff69b440;
    --glow-cyan: 0 0 8px #00ffff20;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: var(--bg-deep);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
}
#app {
    display: flex;
    width: 100%;
    height: 100%;
}
@keyframes blink { 50% { opacity: 0; } }
@keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 8px #ff69b430; }
    50% { box-shadow: 0 0 18px #ff69b460; }
}
@keyframes cyan-pulse {
    0%, 100% { box-shadow: 0 0 4px #00ffff30; }
    50% { box-shadow: 0 0 12px #00ffff50; }
}
@keyframes border-glow {
    0%, 100% { border-color: #ff69b430; box-shadow: 0 0 6px #ff69b410; }
    50% { border-color: #ff69b460; box-shadow: 0 0 14px #ff69b425; }
}
#sidebar {
    width: var(--sidebar-width);
    background: linear-gradient(180deg, #0d0d25 0%, #0a0a1a 100%);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
}
#sidebar .sb-header {
    padding: 14px 12px;
    border-bottom: 1px solid var(--border);
}
#sidebar .sb-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
}
#sidebar .sb-logo .icon {
    color: var(--pink);
    font-weight: 700;
    font-size: 14px;
}
#sidebar .sb-logo .ver {
    font-size: 10px;
    color: var(--cyan-dim);
    background: #00ffff12;
    padding: 1px 6px;
    border-radius: 8px;
}
#new-chat-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--pink), var(--pink-deep));
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 9px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: var(--glow-pink);
    transition: all 0.2s;
}
#new-chat-btn:hover {
    box-shadow: 0 0 20px #ff69b460;
    transform: translateY(-1px);
}
#new-chat-btn:active { transform: translateY(0); }
#session-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
}
#session-list .session-item {
    padding: 8px 10px;
    border: 1px solid transparent;
    border-radius: 6px;
    margin-bottom: 2px;
    cursor: pointer;
    transition: all 0.15s;
}
#session-list .session-item:hover {
    background: #00ffff06;
    border-color: #00ffff15;
}
#session-list .session-item.active {
    background: #00ffff08;
    border-color: #00ffff30;
    box-shadow: var(--glow-cyan);
}
#session-list .session-item .sess-title {
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
#session-list .session-item .sess-meta {
    font-size: 10px;
    color: var(--dim);
    margin-top: 2px;
    display: flex;
    justify-content: space-between;
}
#session-list .session-item.active .sess-meta { color: var(--cyan-dim); }
#sb-status {
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    font-size: 10px;
}
#sb-status .status-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 3px;
    color: var(--dim);
}
#sb-status .status-row .val { color: var(--text); }
#sb-status .status-row .val.cyan { color: var(--cyan-dim); }
#sb-status .status-row .val.pink { color: var(--pink); }
#main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
}
#topbar {
    padding: 8px 16px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
}
#conn-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    flex-shrink: 0;
    transition: all 0.3s;
}
#conn-dot.disconnected {
    background: var(--red);
    box-shadow: 0 0 6px var(--red);
}
#topbar-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
}
#topbar-status {
    font-size: 11px;
    color: var(--dim);
    margin-left: auto;
}
#messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.message {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 10px;
    line-height: 1.55;
    word-break: break-word;
    white-space: pre-wrap;
    animation: msg-in 0.2s ease-out;
}
@keyframes msg-in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
}
.message.user {
    align-self: flex-end;
    background: linear-gradient(135deg, var(--pink), var(--pink-deep));
    color: #fff;
    border-bottom-right-radius: 3px;
    box-shadow: 0 0 12px #ff69b420;
}
.message.assistant {
    align-self: flex-start;
    background: rgba(18, 18, 42, 0.75);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-bottom-left-radius: 3px;
    min-width: 60px;
}
.message.assistant .cursor {
    display: inline-block;
    width: 7px;
    height: 15px;
    background: var(--pink);
    box-shadow: 0 0 6px var(--pink);
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
    margin-left: 2px;
}
.tool-panel {
    align-self: stretch;
    border: 1px solid #00ffff30;
    border-radius: 8px;
    overflow: hidden;
    margin: 4px 0;
    box-shadow: 0 0 8px #00ffff10;
    animation: msg-in 0.2s ease-out;
}
.tool-panel.result { border-color: #3fb95030; box-shadow: 0 0 8px #3fb95010; }
.tool-panel .header {
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
}
.tool-panel .header.call { background: #00ffff08; color: var(--cyan-dim); }
.tool-panel .header.result { background: #3fb95008; color: var(--green); }
.tool-panel .body {
    padding: 8px 12px;
    font-size: 13px;
    font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
    background: rgba(0, 0, 0, 0.25);
    max-height: 300px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    display: none;
}
.tool-panel.open .body { display: block; }
.tool-panel .arrow { transition: transform 0.2s; }
.tool-panel.open .arrow { transform: rotate(90deg); }
#input-area {
    background: var(--bg-surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
}
#input-area textarea {
    flex: 1;
    background: var(--bg-deep);
    color: var(--text);
    border: 1px solid var(--border-glow);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: inherit;
    font-size: 14px;
    resize: none;
    min-height: 42px;
    max-height: 160px;
    line-height: 1.4;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
}
#input-area textarea:focus {
    border-color: var(--pink);
    box-shadow: 0 0 10px #ff69b425;
}
#input-area textarea:disabled {
    border-color: var(--border);
    box-shadow: none;
}
#send-btn {
    background: linear-gradient(135deg, var(--pink), var(--pink-deep));
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: var(--glow-pink);
    transition: all 0.2s;
    flex-shrink: 0;
}
#send-btn:hover { box-shadow: 0 0 18px #ff69b460; transform: translateY(-1px); }
#send-btn:active { transform: translateY(0); }
#send-btn:disabled {
    background: var(--border);
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
}
.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(2px);
    z-index: 100;
    align-items: center;
    justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    max-width: 500px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 0 30px #00000060;
}
.modal h2 { color: var(--cyan-dim); margin-bottom: 12px; font-size: 18px; }
.modal table { width: 100%; border-collapse: collapse; font-size: 13px; }
.modal td { padding: 6px 0; }
.modal td:first-child {
    color: var(--cyan-dim);
    font-weight: 600;
    font-family: monospace;
    width: 110px;
}
.modal .close {
    margin-top: 16px;
    background: linear-gradient(135deg, var(--pink), var(--pink-deep));
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: var(--glow-pink);
    transition: all 0.2s;
}
.modal .close:hover { box-shadow: 0 0 16px #ff69b460; }
</style>
</head>
<body>

<div id="app">
    <nav id="sidebar">
        <div class="sb-header">
            <div class="sb-logo">
                <span class="icon">&#9670; easy-claw</span>
                <span class="ver">v0.5</span>
            </div>
            <button id="new-chat-btn">+ 新对话</button>
        </div>
        <div id="session-list"></div>
        <div id="sb-status">
            <div class="status-row"><span>模型</span><span class="val cyan" id="sb-model">-</span></div>
            <div class="status-row"><span>工作区</span><span class="val" id="sb-workspace">-</span></div>
            <div class="status-row"><span>Token</span><span class="val pink" id="sb-tokens">0</span></div>
        </div>
    </nav>
    <div id="main-area">
        <div id="topbar">
            <span id="conn-dot" class="disconnected"></span>
            <span id="topbar-title">easy-claw</span>
            <span id="topbar-status">连接中...</span>
        </div>
        <div id="messages"></div>
        <div id="input-area">
            <textarea id="input" rows="1" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" disabled></textarea>
            <button id="send-btn" disabled>发送</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-content"></div>
</div>

<script>
const msgEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const statusEl = document.getElementById('status-line');
const dotEl = document.getElementById('conn-dot');
const bannerInfo = document.getElementById('banner-info');
const modalOverlay = document.getElementById('modal-overlay');
const modalContent = document.getElementById('modal-content');

let ws = null;
let currentAssistant = null;
let modelName = '';
let workspace = '';
let version = '';
let sessionId = '';
let turnCount = 0;
let totalTokens = {};
let slashCommands = null;

function buildWsUrl(resumeSessionId) {
    let url = 'ws://' + location.host + '/ws/chat';
    if (resumeSessionId) {
        url += '?session_id=' + encodeURIComponent(resumeSessionId);
    }
    return url;
}

function connect(resumeSessionId) {
    const socket = new WebSocket(buildWsUrl(resumeSessionId));
    ws = socket;
    socket.onopen = () => {
        dotEl.classList.remove('disconnected');
        inputEl.disabled = false;
        sendBtn.disabled = false;
    };
    socket.onclose = () => {
        if (socket !== ws) return;
        dotEl.classList.add('disconnected');
        inputEl.disabled = true;
        sendBtn.disabled = true;
        statusEl.textContent = '连接已断开，2 秒后重连...';
        setTimeout(() => connect(resumeSessionId), 2000);
    };
    socket.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        handleMessage(msg);
    };
}

function disconnect() {
    const socket = ws;
    ws = null;
    dotEl.classList.add('disconnected');
    inputEl.disabled = true;
    sendBtn.disabled = true;
    if (socket && socket.readyState !== WebSocket.CLOSED) socket.close();
}

function handleMessage(msg) {
    switch (msg.type) {
        case 'banner':
            modelName = msg.model || '';
            workspace = msg.workspace || '';
            version = msg.version || '';
            sessionId = msg.session_id || '';
            bannerInfo.textContent = '模型：' + modelName + ' | 工作区：' + workspace + ' | v' + version + ' | ' + sessionId;
            statusEl.textContent = '就绪';
            break;
        case 'token':
            appendToken(msg.content);
            break;
        case 'tool_call_start':
            finishAssistant();
            addToolPanel('call', msg.tool_name, msg.tool_args);
            break;
        case 'tool_call_result':
            addToolPanel('result', msg.tool_name, msg.tool_result || msg.content);
            break;
        case 'approval_required':
            finishAssistant();
            statusEl.textContent = '工具执行需要确认（已自动批准）';
            break;
        case 'done':
            finishAssistant();
            if (msg.usage) {
                totalTokens = msg.usage;
                statusEl.textContent = 'Token：输入 ' + (msg.usage.input||0) + ' / 输出 ' + (msg.usage.output||0) + ' / 总计 ' + (msg.usage.total||0);
            }
            turnCount++;
            break;
        case 'error':
            finishAssistant();
            statusEl.textContent = '错误：' + msg.content;
            break;
    }
    scrollBottom();
}

function appendToken(text) {
    if (!currentAssistant) {
        currentAssistant = document.createElement('div');
        currentAssistant.className = 'message assistant';
        currentAssistant.innerHTML = '<span class="cursor"></span>';
        msgEl.appendChild(currentAssistant);
    }
    const cursor = currentAssistant.querySelector('.cursor');
    cursor.before(document.createTextNode(text));
}

function finishAssistant() {
    const cursor = currentAssistant ? currentAssistant.querySelector('.cursor') : null;
    if (cursor) cursor.remove();
    currentAssistant = null;
}

function addToolPanel(kind, name, content) {
    const panel = document.createElement('div');
    panel.className = 'tool-panel' + (kind === 'result' ? ' result' : '') + ' open';
    const displayName = name || '未知工具';
    const label = kind === 'call' ? '工具调用：' + displayName : '工具结果：' + displayName;
    const formatted = formatContent(content);
    panel.innerHTML =
        '<div class="header ' + kind + '" onclick="togglePanel(this.parentElement)">' +
        '<span>' + label + '</span>' +
        '<span class="arrow">&#9654;</span>' +
        '</div>' +
        '<div class="body">' + escapeHtml(formatted) + '</div>';
    msgEl.appendChild(panel);
}

function togglePanel(panel) {
    panel.classList.toggle('open');
}

function formatContent(val) {
    if (val === null || val === undefined) return '';
    if (typeof val === 'string') return val;
    try { return JSON.stringify(val, null, 2); } catch (e) { return String(val); }
}

function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollBottom() {
    msgEl.scrollTop = msgEl.scrollHeight;
}

function send() {
    const text = inputEl.value;
    if (!text.trim() || !ws || ws.readyState !== WebSocket.OPEN) return;
    const trimmed = text.trim();
    const lowered = trimmed.toLowerCase();

    if (trimmed.startsWith('/') || ['exit', 'quit', ':q'].includes(lowered)) {
        handleSlash(trimmed);
        inputEl.value = '';
        return;
    }

    // 用户消息气泡
    const userMsg = document.createElement('div');
    userMsg.className = 'message user';
    userMsg.textContent = text;
    msgEl.appendChild(userMsg);

    ws.send(text);
    inputEl.value = '';
    inputEl.style.height = '';
    statusEl.textContent = '思考中...';
}

async function loadSlashCommands() {
    if (slashCommands) return slashCommands;
    const response = await fetch('/slash-commands');
    if (!response.ok) throw new Error('无法加载命令列表');
    slashCommands = await response.json();
    return slashCommands;
}

async function fetchJson(path) {
    const response = await fetch(path);
    if (!response.ok) {
        let detail = response.statusText;
        try {
            const payload = await response.json();
            detail = payload.detail || detail;
        } catch (e) {}
        throw new Error(detail);
    }
    return response.json();
}

async function handleSlash(cmd) {
    const parts = cmd.trim().split(/\s+/);
    const token = parts[0].toLowerCase();
    const args = parts.slice(1).join(' ');
    try {
        switch (token) {
        case '/help':
            await showCommandHelp(args);
            break;
        case '/clear':
            msgEl.innerHTML = '';
            statusEl.textContent = '已清空对话视图（服务端会话仍保留）';
            break;
        case '/status':
            showModal(
                '<h2>会话状态</h2>' +
                '<table>' +
                '<tr><td>模型</td><td>' + escapeHtml(modelName) + '</td></tr>' +
                '<tr><td>工作区</td><td>' + escapeHtml(workspace) + '</td></tr>' +
                '<tr><td>版本</td><td>' + escapeHtml(version) + '</td></tr>' +
                '<tr><td>会话</td><td>' + escapeHtml(sessionId) + '</td></tr>' +
                '<tr><td>轮次</td><td>' + turnCount + '</td></tr>' +
                '<tr><td>Token</td><td>' + (totalTokens.total || 0).toLocaleString() + '</td></tr>' +
                '</table>'
            );
            break;
        case '/save':
            downloadMarkdown();
            break;
        case '/skills':
            await showSkills();
            break;
        case '/mcp':
            await showMcp();
            break;
        case '/browser':
            await showBrowser();
            break;
        case '/sessions':
            await showSessions();
            break;
        case '/resume':
            await resumeSession(args);
            break;
        case '/exit':
        case '/quit':
        case 'exit':
        case 'quit':
        case ':q':
            statusEl.textContent = '已断开连接';
            disconnect();
            break;
        default:
            if (['/workspace', '/model', '/doctor', '/delete-session'].includes(token)) {
                statusEl.textContent = token + ' 目前仅支持 CLI。请使用 uv run easy-claw。';
            } else {
                statusEl.textContent = '未知命令：' + cmd;
            }
        }
    } catch (e) {
        statusEl.textContent = '命令执行失败：' + e.message;
    }
}

async function showCommandHelp(commandName) {
    const commands = await loadSlashCommands();
    if (commandName) {
        let normalized = commandName.trim().toLowerCase();
        if (normalized && !normalized.startsWith('/') && !['exit', 'quit', ':q'].includes(normalized)) {
            normalized = '/' + normalized;
        }
        const command = commands.find(c => c.name === normalized || (c.aliases || []).includes(normalized));
        if (!command) {
            statusEl.textContent = '未知命令：' + commandName;
            return;
        }
        showModal(
            '<h2>' + escapeHtml(command.usage) + '</h2>' +
            '<table>' +
            '<tr><td>类别</td><td>' + escapeHtml(command.group) + '</td></tr>' +
            '<tr><td>说明</td><td>' + escapeHtml(command.description) + '</td></tr>' +
            '<tr><td>别名</td><td>' + escapeHtml((command.aliases || []).join(', ') || '-') + '</td></tr>' +
            '</table>'
        );
        return;
    }
    const rows = commands.map(c =>
        '<tr><td>' + escapeHtml(c.usage) + '</td><td>' + escapeHtml(c.description) + '</td></tr>'
    ).join('');
    showModal(
        '<h2>聊天内斜杠命令</h2>' +
        '<table>' + rows + '</table>' +
        '<p style="margin-top:12px;font-size:13px;color:var(--dim)">命令定义来自 CLI slash registry；部分配置类命令在网页端仅显示提示。</p>'
    );
}

async function showSkills() {
    const payload = await fetchJson('/skills');
    const rows = payload.sources.map(source =>
        '<tr><td>' + escapeHtml(source.label) + '</td><td>' +
        escapeHtml(source.skill_count + ' 个 | ' + source.backend_path + ' | ' + source.filesystem_path) +
        '</td></tr>'
    ).join('');
    showModal(
        '<h2>Skill 来源</h2>' +
        '<table>' + (rows || '<tr><td>无</td><td>没有找到 skill 来源</td></tr>') + '</table>' +
        '<p style="margin-top:12px;font-size:13px;color:var(--dim)">共 ' +
        escapeHtml(payload.source_count) + ' 个来源，' + escapeHtml(payload.skill_count) + ' 个 skill。</p>'
    );
}

async function showMcp() {
    const payload = await fetchJson('/mcp');
    showModal(
        '<h2>MCP</h2>' +
        '<table>' +
        '<tr><td>模式</td><td>' + escapeHtml(payload.mode) + '</td></tr>' +
        '<tr><td>状态</td><td>' + escapeHtml(payload.status) + '</td></tr>' +
        '<tr><td>配置</td><td>' + escapeHtml(payload.config_path) + '</td></tr>' +
        '<tr><td>服务数</td><td>' + escapeHtml(payload.server_count) + '</td></tr>' +
        '</table>'
    );
}

async function showBrowser() {
    const payload = await fetchJson('/browser');
    showModal(
        '<h2>浏览器工具</h2>' +
        '<table>' +
        '<tr><td>启用</td><td>' + yesNo(payload.enabled) + '</td></tr>' +
        '<tr><td>无头模式</td><td>' + yesNo(payload.headless) + '</td></tr>' +
        '<tr><td>Chromium</td><td>' + yesNo(payload.chromium_installed) + '</td></tr>' +
        '<tr><td>Headless</td><td>' + yesNo(payload.chromium_headless_installed) + '</td></tr>' +
        '</table>'
    );
}

async function showSessions() {
    const sessions = await fetchJson('/sessions');
    const rows = sessions.map(session =>
        '<tr><td>' + escapeHtml(session.id.slice(0, 8)) + '</td><td>' +
        escapeHtml(session.title + ' | ' + (session.model || '-') + ' | ' + session.updated_at.slice(0, 19)) +
        '</td></tr>'
    ).join('');
    showModal(
        '<h2>历史会话</h2>' +
        '<table>' + (rows || '<tr><td>无</td><td>没有找到会话</td></tr>') + '</table>' +
        '<p style="margin-top:12px;font-size:13px;color:var(--dim)">使用 /resume &lt;session-id&gt; 可按前缀恢复。</p>'
    );
}

async function resumeSession(sessionPrefix) {
    if (!sessionPrefix) {
        statusEl.textContent = '用法：/resume <session-id>';
        return;
    }
    const session = await fetchJson('/sessions/resolve/' + encodeURIComponent(sessionPrefix));
    const oldSocket = ws;
    msgEl.innerHTML = '';
    currentAssistant = null;
    turnCount = 0;
    totalTokens = {};
    statusEl.textContent = '正在恢复会话 ' + session.id.slice(0, 8) + '...';
    connect(session.id);
    if (oldSocket && oldSocket.readyState !== WebSocket.CLOSED) oldSocket.close();
}

function yesNo(value) {
    return value ? '是' : '否';
}

function showModal(html) {
    modalContent.innerHTML = html + '<button class="close" onclick="closeModal()">关闭</button>';
    modalOverlay.classList.add('show');
}

function closeModal() {
    modalOverlay.classList.remove('show');
}

modalOverlay.addEventListener('click', (e) => {
    if (e.target === modalOverlay) closeModal();
});

function downloadMarkdown() {
    const parts = ['# easy-claw 对话记录\n',
        '\n- **会话：** `' + sessionId + '`',
        '- **模型：** ' + modelName,
        '- **工作区：** ' + workspace,
        '- **导出时间：** ' + new Date().toISOString().replace('T',' ').slice(0,19),
        '\n---\n'];
    const children = msgEl.children;
    for (let i = 0; i < children.length; i++) {
        const el = children[i];
        if (el.classList.contains('message')) {
            const role = el.classList.contains('user') ? '**用户：**' : '**easy-claw：**';
            parts.push('\n' + role + '\n\n' + el.textContent + '\n');
        } else if (el.classList.contains('tool-panel')) {
            const header = el.querySelector('.header')?.textContent || '工具';
            const body = el.querySelector('.body')?.textContent || '';
            parts.push('\n> ' + header + '\n> \n> ' + body.replace(/\n/g, '\n> ') + '\n');
        }
    }
    const blob = new Blob([parts.join('\n')], {type: 'text/markdown'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'easy-claw-' + sessionId + '.md';
    a.click();
    statusEl.textContent = '对话记录已下载';
}

inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
    }
});

inputEl.addEventListener('input', () => {
    inputEl.style.height = '';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
});

sendBtn.addEventListener('click', send);

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
});

connect();
</script>
</body>
</html>
